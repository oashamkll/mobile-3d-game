name: Build Defold Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'defold/**'
      - '.github/workflows/defold-android-apk.yml'

permissions:
  contents: read
  actions: read

jobs:
  build-defold-apk:
    name: Build Defold APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download Defold Bob
        run: |
          curl -L -o bob.jar https://github.com/defold/defold/releases/download/1.9.8/bob.jar
      - name: Build Android APK
        working-directory: defold
        run: |
          java -jar ../bob.jar --platform arm64-android --archive --bundle-output ../build --variant debug resolve distclean build bundle
      - name: Upload Defold APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildland-3d-defold-apk
          path: build/**/*.apk
          if-no-files-found: error

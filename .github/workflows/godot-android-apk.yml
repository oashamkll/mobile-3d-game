name: Build Godot Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  build-godot-apk:
    name: Export Godot Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: mkdir -p build

      - name: Import Godot project
        working-directory: godot
        run: godot --headless --editor --quit --import

      - name: Export Android debug APK
        working-directory: godot
        run: godot --headless --export-debug "Android" ../build/wildland-3d-godot-debug.apk

      - name: Upload Godot APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildland-3d-godot-debug-apk
          path: build/*.apk
          if-no-files-found: error

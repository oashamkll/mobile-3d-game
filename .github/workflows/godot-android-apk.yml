name: Build Godot Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  build-godot-apk:
    name: Export Godot Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Godot Android export environment
        run: |
          mkdir -p build
          mkdir -p "$HOME/.local/share/godot/export_templates"
          if [ -d "/root/.local/share/godot/export_templates/4.3.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.3.stable "$HOME/.local/share/godot/export_templates/4.3.stable"
          elif [ -d "/root/.local/share/godot/templates/4.3.stable" ]; then
            cp -r /root/.local/share/godot/templates/4.3.stable "$HOME/.local/share/godot/export_templates/4.3.stable"
          else
            echo "Searching export templates..."
            find / -name android_debug.apk -o -name android_release.apk 2>/dev/null | head -20
          fi
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import Godot project
        working-directory: godot
        run: godot --headless --editor --quit --import

      - name: Export Android debug APK
        working-directory: godot
        run: godot --headless --export-debug "Android" ../build/wildland-3d-godot-debug.apk

      - name: Upload Godot APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildland-3d-godot-debug-apk
          path: build/*.apk
          if-no-files-found: error

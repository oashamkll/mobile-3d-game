name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-apk:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug and signed release APK
        env:
          RELEASE_STORE_PASSWORD: mobile3d2026
          RELEASE_KEY_ALIAS: mobile3d
          RELEASE_KEY_PASSWORD: mobile3d2026
        run: gradle --no-daemon :android:assembleDebug :android:assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-3d-game-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-3d-game-signed-release-apk
          path: android/build/outputs/apk/release/*.apk
          if-no-files-found: error
